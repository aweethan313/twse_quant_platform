{% extends "base.html" %}
{% block title %}月度競賽 | TWSE QUANT{% endblock %}
{% block nav_competition %}bg-surface-3 text-white font-medium{% endblock %}

{% block head %}
<style>
.race-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:14px; margin-bottom:10px; }
.rank-badge { width:28px; height:28px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; }
.rank-1 { background:linear-gradient(135deg,#f6d365,#fda085); color:#000; }
.rank-2 { background:linear-gradient(135deg,#a8c0ff,#3f2b96); color:#fff; }
.rank-3 { background:linear-gradient(135deg,#d4fc79,#96e6a1); color:#000; }
.rank-n { background:#21262d; color:#8b949e; }
.tab-btn { padding:8px 16px; border-radius:6px; font-size:12px; cursor:pointer; color:#8b949e; }
.tab-btn.active { background:#30363d; color:#fff; }
.alpha-pos { color:#44ff88; }
.alpha-neg { color:#ff4444; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-5">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-bold">🏆 月度策略競賽</h1>
    <div class="text-xs text-gray-500" id="last_updated">—</div>
  </div>

  <!-- Tabs -->
  <div class="flex gap-2 mb-4">
    <button class="tab-btn active" onclick="switchTab('race',this)">📊 Forward Paper Race</button>
    <button class="tab-btn" onclick="switchTab('chart',this)">📈 淨值曲線</button>
    <button class="tab-btn" onclick="switchTab('alpha',this)">🎯 Alpha vs 0050</button>
  </div>

  <!-- Tab: Race -->
  <div id="tab_race">
    <div class="race-card mb-4">
      <div class="flex items-center gap-4 flex-wrap text-xs">
        <div>📅 本月起始：<span id="race_start_date" class="text-accent">—</span></div>
        <div>📊 0050 同期：<span id="bench_ret" class="font-mono font-bold">—</span></div>
        <div class="text-gray-500">跑贏 0050 = 正 Alpha ✅</div>
      </div>
    </div>
    <div id="race_list">載入中...</div>
  </div>

  <!-- Tab: 淨值曲線 -->
  <div id="tab_chart" class="hidden">
    <div class="race-card">
      <canvas id="equity_chart" style="max-height:400px"></canvas>
    </div>
  </div>

  <!-- Tab: Alpha -->
  <div id="tab_alpha" class="hidden">
    <div class="race-card">
      <canvas id="alpha_chart" style="max-height:350px"></canvas>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script>
var _equityChart = null, _alphaChart = null;
var COLORS = ['#63b3ed','#48bb78','#f6ad55','#fc8181','#b794f4','#4fd1c7','#f687b3','#ffd700'];

function switchTab(tab, btn) {
  ['race','chart','alpha'].forEach(t => {
    document.getElementById('tab_'+t).classList.add('hidden');
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab_'+tab).classList.remove('hidden');
  btn.classList.add('active');
  if (tab === 'chart') loadEquityChart();
  if (tab === 'alpha') loadAlphaChart();
}

// ── Race Tab ──
async function loadRace() {
  try {
    const today = new Date();
    const startDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    const d = await fetch(`/api/monthly/race?start_date=${startDate}`).then(r=>r.json());

    document.getElementById('race_start_date').textContent = d.start_date || startDate;
    const benchRet = d.benchmark_return || 0;
    document.getElementById('bench_ret').innerHTML =
      `<span class="${benchRet>=0?'text-up':'text-dn'}">${benchRet>=0?'+':''}${benchRet.toFixed(2)}%</span>`;
    document.getElementById('last_updated').textContent =
      '更新時間：' + new Date().toLocaleString('zh-TW');

    const accounts = d.accounts || [];
    if (!accounts.length) {
      document.getElementById('race_list').innerHTML = '<div class="text-gray-600 text-sm py-8 text-center">尚無資料，請先執行每日更新</div>';
      return;
    }

    document.getElementById('race_list').innerHTML = accounts.map((a, i) => {
      const rankCls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-n';
      const alpha = a.alpha_vs_0050 || 0;
      const ret = a.monthly_return || 0;
      const beat = alpha > 0;
      return `
      <div class="race-card">
        <div class="flex items-center gap-3">
          <div class="rank-badge ${rankCls}">${i+1}</div>
          <div class="flex-1">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-medium text-sm">${a.account_name}</span>
              ${beat ? '<span class="text-xs bg-green-900/40 text-green-400 px-2 py-0.5 rounded border border-green-800">✅ 跑贏0050</span>'
                     : '<span class="text-xs bg-red-900/30 text-red-400 px-2 py-0.5 rounded border border-red-800">❌ 跑輸0050</span>'}
            </div>
            <div class="text-xs text-gray-500 mt-0.5">交易 ${a.trading_days||0} 天</div>
          </div>
          <div class="text-right">
            <div class="text-lg font-bold font-mono ${ret>=0?'text-up':'text-dn'}">${ret>=0?'+':''}${ret.toFixed(2)}%</div>
            <div class="text-xs ${alpha>=0?'alpha-pos':'alpha-neg'}">α ${alpha>=0?'+':''}${alpha.toFixed(2)}%</div>
          </div>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('race_list').innerHTML = '<div class="text-red-400 text-sm">載入失敗：'+e.message+'</div>';
  }
}

// ── 淨值曲線 ──
async function loadEquityChart() {
  if (_equityChart) { _equityChart.destroy(); _equityChart = null; }
  try {
    const today = new Date();
    const startDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    const curves = await fetch(`/api/monthly/equity-curves?start_date=${startDate}`).then(r=>r.json());

    // 全域日期對齊
    const allDates = new Set();
    curves.forEach(a => (a.curve||[]).forEach(p => allDates.add(p.date)));
    const labels = [...allDates].sort();

    const datasets = curves.map((a, i) => {
      const map = {};
      (a.curve||[]).forEach(p => map[p.date] = p.return_pct);
      const isBench = !!a.is_benchmark;
      return {
        label: a.name,
        data: labels.map(d => map[d] != null ? +map[d] : null),
        borderColor: isBench ? '#ffd700' : COLORS[i % COLORS.length],
        borderWidth: isBench ? 2.5 : 1.5,
        borderDash: isBench ? [5,3] : [],
        borderDashOffset: 0,
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 1, spanGaps: true,
      };
    });

    const ctx = document.getElementById('equity_chart');
    _equityChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#bbb', font: { size: 10 } } },
          title: { display: true, text: '策略報酬率比較（黃色虛線 = 0050）', color: '#888' },
          tooltip: {
            callbacks: {
              label: item => item.raw == null ? item.dataset.label+': 無資料' :
                `${item.dataset.label}: ${item.raw>=0?'+':''}${item.raw.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#555', maxTicksLimit: 8 } },
          y: { ticks: { color: '#bbb', callback: v => (v>=0?'+':'')+v.toFixed(1)+'%' },
               grid: { color: '#21262d' } }
        }
      }
    });
  } catch(e) { console.error('equity chart', e); }
}

// ── Alpha 曲線 ──
async function loadAlphaChart() {
  if (_alphaChart) { _alphaChart.destroy(); _alphaChart = null; }
  try {
    const today = new Date();
    const startDate = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-01`;
    const curves = await fetch(`/api/monthly/equity-curves?start_date=${startDate}`).then(r=>r.json());

    const benchmark = curves.find(c => c.is_benchmark);
    if (!benchmark) { return; }
    const benchMap = {};
    (benchmark.curve||[]).forEach(p => benchMap[p.date] = p.return_pct);

    const allDates = new Set();
    curves.forEach(a => (a.curve||[]).forEach(p => allDates.add(p.date)));
    const labels = [...allDates].sort();

    const datasets = curves.filter(a => !a.is_benchmark).map((a, i) => {
      const map = {};
      (a.curve||[]).forEach(p => map[p.date] = p.return_pct);
      return {
        label: a.name + ' Alpha',
        data: labels.map(d => {
          const sr = map[d]; const br = benchMap[d];
          if (sr == null || br == null) return null;
          return +(sr - br).toFixed(3);
        }),
        borderColor: COLORS[i % COLORS.length],
        backgroundColor: COLORS[i % COLORS.length] + '20',
        fill: true,
        tension: 0.3, pointRadius: 1, spanGaps: true,
      };
    });

    // 零線
    datasets.push({
      label: '0050 基準', data: labels.map(() => 0),
      borderColor: '#ffd700', borderWidth: 1,
      borderDash: [4,3], backgroundColor: 'transparent',
      pointRadius: 0,
    });

    const ctx = document.getElementById('alpha_chart');
    _alphaChart = new Chart(ctx, {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { labels: { color: '#bbb', font: { size: 10 } } },
          title: { display: true, text: 'Alpha vs 0050（正值=跑贏）', color: '#888' },
          tooltip: {
            callbacks: {
              label: item => item.raw == null ? item.dataset.label+': 無資料' :
                `${item.dataset.label}: ${item.raw>=0?'+':''}${item.raw.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: { ticks: { color: '#555', maxTicksLimit: 8 } },
          y: {
            ticks: { color: '#bbb', callback: v => (v>=0?'+':'')+v.toFixed(1)+'%' },
            grid: { color: '#21262d' }
          }
        }
      }
    });
  } catch(e) { console.error('alpha chart', e); }
}

document.addEventListener('DOMContentLoaded', loadRace);
</script>
{% endblock %}
