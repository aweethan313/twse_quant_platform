{% extends "base.html" %}
{% block title %}績效報表{% endblock %}
{% block content %}

<div class="row g-3 mb-4" id="perfCards">
  <!-- 動態產生 3 個帳戶的績效卡 -->
</div>

<!-- 策略損益曲線 -->
<div class="card mb-4">
  <div class="card-header d-flex justify-content-between align-items-center">
    <span>策略損益曲線</span>
    <div class="btn-group btn-group-sm" id="equityPeriod">
      <button class="btn btn-outline-secondary active" data-days="30">30天</button>
      <button class="btn btn-outline-secondary" data-days="90">90天</button>
      <button class="btn btn-outline-secondary" data-days="0">全部</button>
    </div>
  </div>
  <div class="card-body">
    <canvas id="equityChart" style="height:300px;"></canvas>
  </div>
</div>

<!-- 交易明細 -->
<div class="card">
  <div class="card-header d-flex align-items-center gap-3">
    <span class="fw-bold">交易明細</span>
    <select class="form-select form-select-sm" id="filterAccount" style="max-width:180px;">
      <option value="">全部帳戶</option>
    </select>
    <select class="form-select form-select-sm" id="filterDir" style="max-width:100px;">
      <option value="">買賣</option>
      <option value="BUY">買入</option>
      <option value="SELL">賣出</option>
    </select>
    <span id="tradeCount" class="badge bg-secondary ms-auto">-- 筆</span>
  </div>
  <div class="card-body p-0" style="max-height:480px;overflow-y:auto;">
    <table class="table table-sm table-hover mb-0">
      <thead class="sticky-top" style="background:var(--card-bg);">
        <tr>
          <th>日期</th><th>帳戶</th><th>代號</th><th>名稱</th>
          <th class="text-end">方向</th><th class="text-end">張數</th>
          <th class="text-end">成交價</th><th class="text-end">損益</th><th>觸發</th>
        </tr>
      </thead>
      <tbody id="tradeBody">
        <tr><td colspan="9" class="text-center text-muted py-4">載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<style>
.perf-card{background:var(--card-bg);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:16px;}
.perf-metric{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.05);}
.perf-metric:last-child{border-bottom:none;}
.perf-metric .label{font-size:0.82rem;color:#888;}
.perf-metric .value{font-weight:600;font-size:0.95rem;}
.perf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.total-return{font-size:1.8rem;font-weight:700;}
</style>

<script>
(function(){
  let equityChart = null;
  let allTrades = [];
  let equityDays = 30;

  // ─── 績效卡 ───
  async function loadPerfCards(){
    try{
      const r = await fetch('/api/performance/summary');
      const accs = await r.json();
      const container = document.getElementById('perfCards');
      const sel = document.getElementById('filterAccount');

      container.innerHTML = '';
      accs.forEach(acc=>{
        // 填帳戶選單
        const opt = document.createElement('option');
        opt.value = acc.id; opt.textContent = acc.name;
        sel.appendChild(opt);

        const totalReturn = acc.total_return_pct||0;
        const returnCls = totalReturn>=0?'text-danger':'text-success';
        const winRate = acc.win_rate||0;

        const col = document.createElement('div');
        col.className = 'col-md-4';
        col.innerHTML = `<div class="perf-card">
          <div class="perf-header">
            <div>
              <div class="fw-bold">${acc.name}</div>
              <div class="text-muted small">${acc.strategy_class}</div>
            </div>
            <div class="text-end">
              <div class="total-return ${returnCls}">${totalReturn>=0?'+':''}${totalReturn.toFixed(2)}%</div>
              <div class="small text-muted">總報酬</div>
            </div>
          </div>
          <div class="perf-metric"><span class="label">初始資金</span><span class="value">$${(acc.initial_cash/1e4).toFixed(0)}萬</span></div>
          <div class="perf-metric"><span class="label">現值</span><span class="value">$${((acc.equity||acc.initial_cash)/1e4).toFixed(1)}萬</span></div>
          <div class="perf-metric"><span class="label">勝率</span><span class="value ${winRate>=50?'text-danger':'text-success'}">${winRate.toFixed(1)}%</span></div>
          <div class="perf-metric"><span class="label">平均報酬/筆</span><span class="value">${acc.avg_trade_pct?.toFixed(2)||'--'}%</span></div>
          <div class="perf-metric"><span class="label">最大回撤</span><span class="value text-success">-${Math.abs(acc.max_drawdown_pct||0).toFixed(2)}%</span></div>
          <div class="perf-metric"><span class="label">夏普比率</span><span class="value">${acc.sharpe?.toFixed(2)||'--'}</span></div>
          <div class="perf-metric"><span class="label">交易筆數</span><span class="value">${acc.trade_count||0} 筆</span></div>
          <div class="perf-metric"><span class="label">平均持倉天數</span><span class="value">${acc.avg_hold_days?.toFixed(1)||'--'} 天</span></div>
        </div>`;
        container.appendChild(col);
      });
    }catch(e){console.error(e);}
  }

  // ─── 損益曲線 ───
  async function loadEquityCurve(){
    try{
      const r = await fetch(`/api/performance/equity_curves?days=${equityDays}`);
      const d = await r.json();
      if(!d.labels?.length) return;

      const palette = ['#ff4444','#44aaff','#44ff88','#ffcc00'];
      const datasets = d.series.map((s,i)=>({
        label: s.name,
        data: s.values,
        borderColor: palette[i%palette.length],
        backgroundColor: 'transparent',
        borderWidth: 2,
        pointRadius: 0,
        tension: 0.3,
      }));

      // 加上 0% 基準線
      datasets.push({
        label:'基準(0%)',
        data: d.labels.map(()=>0),
        borderColor:'rgba(255,255,255,0.2)',
        borderWidth:1,borderDash:[4,4],
        pointRadius:0,fill:false
      });

      const ctx = document.getElementById('equityChart').getContext('2d');
      if(equityChart) equityChart.destroy();
      equityChart = new Chart(ctx,{
        type:'line',
        data:{labels:d.labels, datasets},
        options:{
          responsive:true,maintainAspectRatio:false,animation:false,
          interaction:{mode:'index',intersect:false},
          plugins:{
            legend:{labels:{color:'#aaa',font:{size:11}}},
            tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y?.toFixed(2)}%`}}
          },
          scales:{
            x:{ticks:{color:'#666',maxTicksLimit:12,font:{size:10}},grid:{color:'rgba(255,255,255,0.04)'}},
            y:{
              ticks:{color:'#888',font:{size:10},callback:v=>`${v>=0?'+':''}${v.toFixed(1)}%`},
              grid:{color:'rgba(255,255,255,0.06)'},
              position:'right'
            }
          }
        }
      });
    }catch(e){console.error(e);}
  }

  // ─── 交易明細 ───
  async function loadTrades(){
    const accId = document.getElementById('filterAccount').value;
    const dir   = document.getElementById('filterDir').value;
    try{
      const url = `/api/trades?account_id=${accId}&direction=${dir}&limit=200`;
      const r = await fetch(url);
      allTrades = await r.json();
      renderTrades();
    }catch(e){}
  }

  function renderTrades(){
    const tbody = document.getElementById('tradeBody');
    document.getElementById('tradeCount').textContent = `${allTrades.length} 筆`;
    if(!allTrades.length){
      tbody.innerHTML='<tr><td colspan="9" class="text-center text-muted py-4">無交易紀錄</td></tr>';
      return;
    }
    tbody.innerHTML = allTrades.map(t=>{
      const pnl = t.pnl||0;
      const pnlCls = pnl>0?'text-danger':pnl<0?'text-success':'text-muted';
      const dirCls = t.direction==='BUY'?'text-danger':'text-success';
      return `<tr>
        <td class="text-muted small">${t.trade_date}</td>
        <td class="small">${t.account_name||'-'}</td>
        <td><a href="/stock/${t.code}" class="text-warning text-decoration-none">${t.code}</a></td>
        <td class="small text-muted">${t.name||''}</td>
        <td class="text-end ${dirCls}">${t.direction==='BUY'?'買':'賣'}</td>
        <td class="text-end">${t.lots}</td>
        <td class="text-end">$${t.price?.toFixed(2)||'--'}</td>
        <td class="text-end ${pnlCls} fw-bold">${pnl?`$${pnl.toLocaleString()}`:'--'}</td>
        <td class="small text-muted">${t.trigger||''}</td>
      </tr>`;
    }).join('');
  }

  // ─── 事件 ───
  document.querySelectorAll('#equityPeriod button').forEach(btn=>{
    btn.addEventListener('click',function(){
      document.querySelectorAll('#equityPeriod button').forEach(b=>b.classList.remove('active'));
      this.classList.add('active');
      equityDays = parseInt(this.dataset.days);
      loadEquityCurve();
    });
  });
  document.getElementById('filterAccount').addEventListener('change',loadTrades);
  document.getElementById('filterDir').addEventListener('change',loadTrades);

  // ─── 初始化 ───
  async function init(){
    await loadPerfCards();
    await loadEquityCurve();
    await loadTrades();
  }
  init();
})();
</script>
{% endblock %}
