{% extends "base.html" %}
{% block title %}個股分析 | TWSE QUANT{% endblock %}

{% block head %}
<style>
.s-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:14px; margin-bottom:10px; }
.tag { padding:2px 8px; border-radius:12px; font-size:11px; }
</style>
{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 py-5">
  <!-- 搜尋 -->
  <div class="flex gap-2 mb-4">
    <input id="code_input" class="bg-surface-2 border border-border rounded px-3 py-2 text-sm flex-1 max-w-xs"
           placeholder="輸入股票代號，例如 2330" onkeydown="if(event.key==='Enter')loadStock()">
    <button onclick="loadStock()" class="px-4 py-2 rounded bg-blue-900/40 text-blue-400 border border-blue-800 text-sm">查詢</button>
  </div>

  <div id="stock_content" class="hidden">
    <!-- 基本資訊 -->
    <div class="s-card mb-3">
      <div class="flex items-center justify-between flex-wrap gap-2">
        <div>
          <span class="text-2xl font-bold" id="s_name">—</span>
          <span class="text-gray-500 ml-2 text-sm" id="s_code">—</span>
          <span class="tag bg-blue-900/40 text-blue-400 ml-2" id="s_class">—</span>
        </div>
        <div class="text-right">
          <div class="text-2xl font-bold font-mono" id="s_price">—</div>
          <div class="text-sm" id="s_change">—</div>
        </div>
      </div>
      <div class="mt-2 text-xs text-gray-500" id="s_meta_row"></div>
    </div>

    <!-- 技術指標 -->
    <div class="s-card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">📊 技術指標</div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs" id="s_tech"></div>
    </div>

    <!-- 分數歷史 -->
    <div class="s-card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">🎯 最新評分</div>
      <div id="s_score"></div>
    </div>

    <!-- 籌碼 -->
    <div class="s-card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">🏦 最新籌碼</div>
      <div id="s_chip"></div>
    </div>

    <!-- 策略活動 -->
    <div class="s-card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">⚡ 策略持倉 / 活動</div>
      <div id="s_strategy"></div>
    </div>

    <!-- 冷卻期 -->
    <div class="s-card" id="s_cooldown_card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">❄️ 停損冷卻期</div>
      <div id="s_cooldown"></div>
    </div>

    <!-- 被選後表現 -->
    <div class="s-card">
      <div class="text-xs text-gray-500 font-semibold uppercase mb-2">📈 被選後表現（歷史）</div>
      <div id="s_forward"></div>
    </div>
  </div>
</div>

<script>
async function loadStock() {
  const code = document.getElementById('code_input').value.trim();
  if (!code) return;
  document.getElementById('stock_content').classList.remove('hidden');

  // 基本資訊
  try {
    const [score, kline, chip, tech, techFeature] = await Promise.all([
      fetch(`/api/stock/${code}/latest_score`).then(r=>r.json()).catch(()=>({})),
      fetch(`/api/stock/${code}/kline?days=3`).then(r=>r.json()).catch(()=>({})),
      fetch(`/api/stock/${code}/chip`).then(r=>r.json()).catch(()=>[]),
      fetch(`/api/stock/${code}/technical?days=1`).then(r=>r.json()).catch(()=>[]),
      fetch(`/api/stock-tech?code=${code}`).then(r=>r.json()).catch(()=>({})),
    ]);

    // 基本
    const kd = Array.isArray(kline) ? kline : (kline.data||[]);
    const last = kd[kd.length-1]||{};
    document.getElementById('s_name').textContent = kline.name || code;
    document.getElementById('s_code').textContent = code;
    document.getElementById('s_class').textContent = (score.stock_class||score.class_) || '—';
    document.getElementById('s_price').textContent = last.close || '—';
    const chg = last.change_pct;
    document.getElementById('s_change').innerHTML = chg != null ?
      `<span class="${chg>=0?'text-up':'text-dn'}">${chg>=0?'+':''}${parseFloat(chg).toFixed(2)}%</span>` : '—';

    // 技術指標（支援多種 API 格式）
    const techArr = Array.isArray(tech) ? tech : (tech.data||[tech]);
    const t = techArr[0] || techFeature || {};
    document.getElementById('s_tech').innerHTML = t ? [
      ['RSI14', (t.rsi14||0).toFixed(1), t.rsi14>=70?'text-red-400':t.rsi14<=30?'text-green-400':''],
      ['MA20距離', `${(t.distance_ma20||0).toFixed(2)}%`, (t.distance_ma20||0)>=0?'text-up':'text-dn'],
      ['5日報酬', `${(t.return_5d||0).toFixed(2)}%`, (t.return_5d||0)>=0?'text-up':'text-dn'],
      ['MA20', t.ma20||'—', ''],
    ].map(([label, val, cls]) => `<div class="bg-surface-1 rounded p-2 text-center">
      <div class="text-gray-500 mb-1">${label}</div>
      <div class="font-bold ${cls}">${val}</div>
    </div>`).join('') : '<div class="text-gray-600 text-xs">無技術指標資料</div>';

    // 評分
    const finalScore = score.composite_score ?? score.final_score;
    document.getElementById('s_score').innerHTML = finalScore != null ? `
      <div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs">
        ${[['綜合', finalScore],['動能', score.momentum_score??score.momentum],
           ['籌碼', score.chip_score??score.chip],['風險', score.risk_score??score.risk]].map(([l,v])=>`
          <div class="bg-surface-1 rounded p-2 text-center">
            <div class="text-gray-500 mb-1">${l}</div>
            <div class="font-bold ${v>=70?'text-up':v<=30?'text-dn':''}">${(v||0).toFixed(1)}</div>
          </div>`).join('')}
      </div>
      <div class="mt-2 text-xs"><span class="text-gray-500">訊號：</span><span class="text-accent">${score.signal||'—'}</span>
      <span class="text-gray-500 ml-3">動作：</span><span class="text-white">${score.final_action||'—'}</span></div>
    ` : '<div class="text-gray-600 text-xs">無評分資料</div>';

    // 籌碼
    const chipData = Array.isArray(chip) ? chip[0] : chip;
    document.getElementById('s_chip').innerHTML = chipData ? `
      <div class="grid grid-cols-3 gap-2 text-xs">
        <div class="bg-surface-1 rounded p-2 text-center">
          <div class="text-gray-500">外資淨買</div>
          <div class="font-bold ${(chipData.foreign_net||0)>=0?'text-up':'text-dn'}">${(chipData.foreign_net||0).toFixed(0)} 張</div>
        </div>
        <div class="bg-surface-1 rounded p-2 text-center">
          <div class="text-gray-500">投信淨買</div>
          <div class="font-bold ${(chipData.trust_net||0)>=0?'text-up':'text-dn'}">${(chipData.trust_net||0).toFixed(0)} 張</div>
        </div>
        <div class="bg-surface-1 rounded p-2 text-center">
          <div class="text-gray-500">自營商</div>
          <div class="font-bold ${(chipData.dealer_net||0)>=0?'text-up':'text-dn'}">${(chipData.dealer_net||0).toFixed(0)} 張</div>
        </div>
      </div>
    ` : '<div class="text-gray-600 text-xs">無籌碼資料</div>';

  } catch(e) { console.error(e); }

  // 策略持倉
  try {
    const positions = await fetch(`/api/v6/stock-positions?code=${code}`).then(r=>r.json());
    document.getElementById('s_strategy').innerHTML = positions.length ?
      positions.map(p=>`<div class="text-xs border-b border-gray-800 py-1">
        <span class="text-accent">A${p.account_id}</span> 持有 <span class="font-bold">${p.lots}</span> 股
        均成本 ${p.avg_cost} | 未實現 <span class="${(p.pnl_pct||0)>=0?'text-up':'text-dn'}">${(p.pnl_pct||0)>=0?'+':''}${(p.pnl_pct||0).toFixed(2)}%</span>
      </div>`).join('') :
      '<div class="text-gray-600 text-xs">目前無策略持倉</div>';
  } catch(e) {}

  // 冷卻期
  try {
    const cds = await fetch(`/api/v6/cooldowns?active_only=true`).then(r=>r.json());
    const mine = cds.filter(c=>c.code===code);
    document.getElementById('s_cooldown').innerHTML = mine.length ?
      mine.map(c=>`<div class="text-xs text-yellow-400">❄️ ${c.strategy_name} 冷卻至 ${c.cooldown_until}（${c.reason}）</div>`).join('') :
      '<div class="text-gray-600 text-xs">無冷卻期</div>';
  } catch(e) {}

  // 歷史被選後表現
  try {
    const fwd = await fetch(`/api/v6/candidate-forward-returns?signal_date=latest&limit=100`).then(r=>r.json());
    const myFwd = fwd.filter(f=>f.code===code);
    document.getElementById('s_forward').innerHTML = myFwd.length ?
      `<table class="w-full text-xs">
        <thead><tr class="text-gray-500"><th class="text-left py-1">信號日</th><th class="text-right">分數</th><th class="text-right">1日</th><th class="text-right">5日</th><th class="text-right">10日</th><th class="text-right">Alpha5</th></tr></thead><tbody>
        ${myFwd.slice(0,10).map(f=>`<tr class="border-t border-gray-800">
          <td class="py-1">${f.signal_date}</td>
          <td class="text-right">${(f.candidate_score||0).toFixed(1)}</td>
          <td class="text-right ${(f.return_1d||0)>=0?'text-up':'text-dn'}">${f.return_1d!=null?(f.return_1d>=0?'+':'')+f.return_1d.toFixed(2)+'%':'—'}</td>
          <td class="text-right ${(f.return_5d||0)>=0?'text-up':'text-dn'}">${f.return_5d!=null?(f.return_5d>=0?'+':'')+f.return_5d.toFixed(2)+'%':'—'}</td>
          <td class="text-right ${(f.return_10d||0)>=0?'text-up':'text-dn'}">${f.return_10d!=null?(f.return_10d>=0?'+':'')+f.return_10d.toFixed(2)+'%':'—'}</td>
          <td class="text-right ${(f.alpha_5d_vs_0050||0)>=0?'text-green-400':'text-red-400'}">${f.alpha_5d_vs_0050!=null?(f.alpha_5d_vs_0050>=0?'+':'')+f.alpha_5d_vs_0050.toFixed(2)+'%':'—'}</td>
        </tr>`).join('')}
        </tbody></table>` :
      '<div class="text-gray-600 text-xs">無歷史選股記錄</div>';
  } catch(e) {}
}

// URL 直接帶代號
const urlCode = window.location.pathname.split('/').pop();
if (urlCode && urlCode !== 'stock') {
  document.getElementById('code_input').value = urlCode;
  loadStock();
}
</script>
{% endblock %}
