{% extends "base.html" %}
{% block title %}每日作戰室 | TWSE Alpha Lab{% endblock %}
{% block nav_warroom %}bg-surface-3 text-white font-medium{% endblock %}

{% block head %}
<style>
.dc-card { background:#161b22; border:1px solid #30363d; border-radius:10px; padding:16px; margin-bottom:12px; }
.dc-row { display:flex; justify-content:space-between; align-items:center;
          padding:5px 0; font-size:12px; border-bottom:1px solid #21262d; }
.dc-row:last-child { border-bottom:none; }
.dc-label { color:#8b949e; min-width:120px; }
.dc-val { font-weight:500; }
.badge-ok   { background:rgba(68,255,136,.15); color:#44ff88; padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-warn { background:rgba(255,204,0,.15);  color:#ffcc00; padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-fail { background:rgba(255,68,68,.15);  color:#ff4444; padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-buy  { background:rgba(68,255,136,.15); color:#44ff88; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
.badge-sell { background:rgba(255,68,68,.15);  color:#ff4444; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:700; }
.badge-hold { background:rgba(100,100,100,.2); color:#888;    padding:2px 8px; border-radius:4px; font-size:11px; }
.badge-blk  { background:rgba(255,130,0,.15);  color:#ff8200; padding:2px 8px; border-radius:4px; font-size:11px; }
.t1-mode-banner {
  background:rgba(99,179,237,.08); border:1px solid rgba(99,179,237,.3);
  border-radius:8px; padding:8px 16px; font-size:11px; color:#63b3ed;
  margin-bottom:16px;
}
</style>
{% endblock %}

{% block content %}

  <div id="dc_restrictions">載入中...</div>
  </div>

</div>

<script>
var _allSignals = [];

function row(label, val) {
  return `<div class="dc-row"><span class="dc-label">${label}</span><span class="dc-val">${val}</span></div>`;
}
function badge(status) {
  var cls = {PASS:'badge-ok',WARN:'badge-warn',FAIL:'badge-fail',
             BUY:'badge-buy',SELL:'badge-sell',HOLD:'badge-hold',
             WATCH:'badge-warn',BLOCKED:'badge-blk',
             ACTIVE:'badge-ok',REDUCED:'badge-warn',PAUSED:'badge-fail',WATCHLIST:'badge-warn'};
  return `<span class="${cls[status]||'badge-hold'}">${status}</span>`;
}

// A. 資料狀態
async function loadFreshness() {
  try {
    var d = await fetch('/api/freshness').then(r=>r.json());
    var today = new Date().toISOString().slice(0,10);
    document.getElementById('banner_data_date').textContent = d.ohlcv_daily || '—';
    document.getElementById('banner_exec_date').textContent =
      d.ohlcv_daily ? new Date(new Date(d.ohlcv_daily).getTime()+86400000).toISOString().slice(0,10) : '—';
    document.getElementById('banner_decision_time').textContent = new Date().toLocaleString('zh-TW');

    var items = [
      ['日K (ohlcv_daily)', d.ohlcv_daily],
      ['分數 (daily_scores)', d.daily_scores],
      ['技術指標', d.technical_features],
      ['股權 equity_curve', d.equity_curve],
      ['籌碼 chip_daily', d.chip_daily],
      ['主題熱度', d.theme_trend],
      ['大盤環境', d.market_context],
      ['分鐘資料', d.ohlcv_1min === '無資料' ? '⚠️ 未啟用（不影響日級策略）' : d.ohlcv_1min],
    ];
    document.getElementById('dc_freshness').innerHTML = items.map(([k,v]) => {
      var isWarn = !v || v==='無資料' || v==='表不存在';
      var isOld = v && v !== '無資料' && v < today && v !== '⚠️ 未啟用（不影響日級策略）';
      var cls = isWarn ? 'text-orange-400' : isOld ? 'text-yellow-400' : 'text-green-400';
      return row(k, `<span class="${cls}">${v||'無資料'}</span>`);
    }).join('');
  } catch(e) { document.getElementById('dc_freshness').textContent='載入失敗'; }
}

// B. 大盤環境
async function loadMarket() {
  try {
    var [d, ctx, ov, enh] = await Promise.all([
      fetch('/api/market/overview').then(r=>r.json()),
      fetch('/api/v3/strategies/router').then(r=>r.json()),
      fetch('/api/v2/overnight').then(r=>r.json()),
      fetch('/api/v2/overnight-enhanced').then(r=>r.json()).catch(()=>({})),
    ]);
    var trendMap = {bullish:'🟢 多頭',neutral:'🟡 盤整',bearish:'🔴 空頭'};
    var rl = ctx.risk_level || 'medium';
    var rlColor = rl==='high'?'#ff4444':rl==='low'?'#44ff88':'#ffcc00';

    // 夜盤資訊
    var ovScore = enh.overnight_score || 50;
    var ovColor = ovScore >= 60 ? '#44ff88' : ovScore <= 40 ? '#ff4444' : '#ffcc00';
    var ovIcon = ovScore >= 60 ? '📈' : ovScore <= 40 ? '📉' : '➡️';

    // 台股代理（0050）
    var twse = enh.twse_proxy || {};
    var twseColor = (twse.change_pct||0) >= 0 ? '#ff6b6b' : '#51cf66';

    // 大盤廣度
    var breadth = enh.breadth || {};

    document.getElementById('dc_market').innerHTML =
      // 今日可否買進
      var canBuy = ctx.risk_level !== 'high' && (ctx.position_multiplier||0) > 0;
      var buyColor = canBuy ? '#ff3333' : '#33cc66';
      var buyText  = canBuy ? '✅ 可以買進' : '🚫 暫停買進';
      document.getElementById('dc_market').innerHTML =
        `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
          <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:11px;color:#8b949e">今日操作</div>
            <div style="font-size:15px;font-weight:700;margin-top:4px;color:${buyColor}">${buyText}</div>
          </div>
          <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:11px;color:#8b949e">部位倍率</div>
            <div style="font-size:18px;font-weight:700;font-family:monospace;margin-top:4px;color:#f0b429">${((ctx.position_multiplier||0.65)*100).toFixed(0)}%</div>
          </div>
          <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
            <div style="font-size:11px;color:#8b949e">市場趨勢</div>
            <div style="font-size:14px;font-weight:700;margin-top:4px">${trendMap[ctx.market_trend]||ctx.market_trend||'—'}</div>
          </div>
        </div>` +
        row('0050', `<span class="font-mono font-bold">${twse.close||'—'}</span> <span style="color:${twseColor}">${(twse.change_pct||0)>=0?'+':''}${(twse.change_pct||0).toFixed(2)}%</span>`) +
        (enh.taiex_close ? row('加權指數', `<span class="font-mono font-bold text-accent">${Math.round(enh.taiex_close).toLocaleString()}</span> <span style="color:${(enh.taiex_change||0)>=0?'#ff3333':'#33cc66'}">${(enh.taiex_change||0)>=0?'+':''}${Math.round(enh.taiex_change||0)}</span>`) : '') +
        row('台股廣度', `<span class="text-up">↑${breadth.up||0}</span> <span class="text-dn">↓${breadth.down||0}</span> 均${(breadth.avg_change||0)>=0?'+':''}${(breadth.avg_change||0).toFixed(2)}%`) +
        row('夜盤情緒', `<span>${ovIcon}</span> <span style="color:${ovColor}" class="text-xs">${enh.summary||ov.summary||'—'}</span>`);
  } catch(e) { document.getElementById('dc_market').textContent='載入失敗'; }
}

}

// C. T+1 交易建議
async function loadSignals() {
  try {
    var data = await fetch('/api/candidates/trade-plans?limit=10').then(r=>r.json());
    _allSignals = Array.isArray(data) ? data : [];
    var el = document.getElementById('dc_signals_summary');
    if (!el) return;
    var buys = _allSignals.filter(s=>!s.invalid_buy_condition);
    el.innerHTML = buys.slice(0,5).map(s=>
      `<div style="display:inline-block;background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:8px 12px;margin:3px;min-width:140px;vertical-align:top">
        <div><a href="/stock/${s.code}" style="color:#63b3ed;font-family:monospace;font-weight:700">${s.code}</a> <span style="font-size:12px">${s.name||''}</span></div>
        <div style="font-size:11px;color:#8b949e;margin-top:3px">進場 <b style="color:#f0b429">${s.entry_price_low??'—'}~${s.entry_price_high??'—'}</b></div>
        <div style="font-size:11px;margin-top:2px">
          <span style="color:#ff3333">目標 ${s.target_price_1??'—'}</span>
          <span style="color:#33cc66;margin-left:8px">停損 ${s.stop_loss_price??'—'}</span>
        </div>
        <div style="font-size:10px;color:#8b949e;margin-top:2px">風報 ${s.risk_reward_ratio??'—'}</div>
      </div>`
    ).join('') + (buys.length > 5 ? `<div style="font-size:11px;color:#63b3ed;margin-top:6px">+ 還有 ${buys.length-5} 檔，<a href="/candidates" style="color:#63b3ed">查看今日選股 →</a></div>` : '');
  } catch(e) {
    var el = document.getElementById('dc_signals_summary');
    if (el) el.textContent='尚無建議';
  }
}

function filterSignal(type, btn) {
  document.querySelectorAll('#dc_signals').forEach(()=>{});
  renderSignals(type);
}

function renderSignals(filter) {
  var raw = filter==='all' ? _allSignals :
    _allSignals.filter(s => {
      if (filter==='BUY') return !s.invalid_buy_condition;
      if (filter==='WATCH') return s.candidate_pool_type==='WATCH';
      if (filter==='BLOCKED') return !!s.invalid_buy_condition;
      return true;
    });

  // 資金限制：優先核心大型股（前5）+ 強勢候選（前5），共最多10檔
  var coreTypes = ['CORE_LARGE_CAP','ETF_CORE'];
  var core = raw.filter(s => coreTypes.includes(s.candidate_pool_type) && !s.invalid_buy_condition);
  var active = raw.filter(s => !coreTypes.includes(s.candidate_pool_type) && !s.invalid_buy_condition);
  var blocked = raw.filter(s => s.invalid_buy_condition);
  var data;
  if (filter === 'all') {
    data = [...core.slice(0,5), ...active.slice(0,5), ...blocked.slice(0,3)];
  } else {
    data = raw.slice(0, 15);
  }

  if (!data.length) {
    document.getElementById('dc_signals').innerHTML='<div class="text-gray-600 text-xs py-4 text-center">尚無資料</div>';
    return;
  }
  document.getElementById('dc_signals').innerHTML = `
    <table class="w-full text-xs">
      <thead><tr class="text-gray-500">
        <th class="text-left py-2">代號</th><th class="text-left">名稱</th>
        <th class="text-right">參考價</th><th class="text-right">進場區間</th>
        <th class="text-right">目標</th><th class="text-right">停損</th>
        <th class="text-right">風報</th><th class="text-right">建議股數</th>
        <th class="text-left">訊號/理由</th>
      </tr></thead>
      <tbody>
      ${data.map(s=>`<tr class="border-t border-gray-800">
        <td class="py-1 font-mono text-blue-400">${s.code}</td>
        <td>${s.name||''}</td>
        <td class="text-right font-mono">${s.reference_price||'—'}</td>
        <td class="text-right font-mono text-xs">${s.entry_price_low||'—'}～${s.entry_price_high||'—'}</td>
        <td class="text-right font-mono text-up">${s.target_price_1||'—'}</td>
        <td class="text-right font-mono text-dn">${s.stop_loss_price||'—'}</td>
        <td class="text-right">${s.risk_reward_ratio||'—'}</td>
        <td class="text-right">${s.suggested_shares||'—'} 股</td>
        <td class="text-xs ${s.invalid_buy_condition?'text-orange-400':'text-gray-400'}">${
          s.invalid_buy_condition ? '⚠️'+s.invalid_buy_condition.slice(0,30) : (s.candidate_pool_type||'').slice(0,20)
        }</td>
      </tr>`).join('')}
      </tbody>
    </table>`;
}

// D. 策略帳戶
async function loadAccounts() {
  try {
    var data = await fetch('/api/strategies').then(r=>r.json());
    document.getElementById('dc_accounts').innerHTML = `
      <table class="w-full text-xs">
        <thead><tr class="text-gray-500">
          <th class="text-left py-2">帳戶</th><th class="text-right">總資產</th>
          <th class="text-right">現金</th><th class="text-right">市值</th>
          <th class="text-right">今日損益</th><th class="text-right">累積損益</th>
          <th class="text-left">最近交易</th>
        </tr></thead>
        <tbody>
        ${data.map(a=>`<tr class="border-t border-gray-800">
          <td class="py-1"><b>S${a.account_id}</b> ${a.name}</td>
          <td class="text-right font-mono">${Math.round(a.total_equity||0).toLocaleString()}</td>
          <td class="text-right font-mono">${Math.round(a.cash||0).toLocaleString()}</td>
          <td class="text-right font-mono">${Math.round(a.market_value||0).toLocaleString()}</td>
          <td class="text-right font-mono ${(a.daily_return||0)>=0?'text-up':'text-dn'}">${(a.daily_return||0)>=0?'+':''}${(+(a.daily_return||0)).toFixed(2)}%</td>
          <td class="text-right font-mono ${(a.total_return||0)>=0?'text-up':'text-dn'}">${(a.total_return||0)>=0?'+':''}${(+(a.total_return||0)).toFixed(2)}%</td>
          <td class="text-gray-500">${a.last_trade_date||'—'}</td>
        </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) { document.getElementById('dc_accounts').textContent='載入失敗'; }
}

// E. 今天不能做的事
async function loadReview() {
  try {
    // 用 history API 直接拿結構化資料
    var hist = await fetch('/api/daily-review-history?limit=1').then(r=>r.json());
    if (!hist.length) {
      document.getElementById('review_summary').textContent = '尚無檢討資料';
      return;
    }
    var r = hist[0];
    document.getElementById('review_date').textContent = r.signal_date + ' → ' + r.review_date;
    var winColor = r.win_rate >= 60 ? '#44ff88' : r.win_rate >= 40 ? '#ffcc00' : '#ff4444';
    var retColor = r.avg_return >= 0 ? '#ff6b6b' : '#51cf66';

    // 前3強（從詳細 API 取）
    var top3txt = '';
    try {
      var detail = await fetch('/api/daily-review?signal_date='+r.signal_date+'&review_date='+r.review_date).then(x=>x.json());
      var lines = (detail.content||'').split('\n');
      var top3 = [], inTop = false;
      lines.forEach(l => {
        if (l.includes('## 🏆')) { inTop = true; return; }
        if (inTop && l.startsWith('- **')) {
          top3.push(l.replace(/- \*\*(.+?)\*\*.*/,'$1'));
          if (top3.length >= 3) inTop = false;
        }
      });
      top3txt = top3.join(' / ');
    } catch(e) {}

    document.getElementById('review_summary').innerHTML = `
      <div class="grid grid-cols-3 gap-2 mb-2">
        <div class="text-center">
          <div class="text-xl font-bold" style="color:${winColor}">${r.win_rate}%</div>
          <div class="text-xs text-gray-500">勝率</div>
        </div>
        <div class="text-center">
          <div class="text-xl font-bold" style="color:${retColor}">${r.avg_return>=0?'+':''}${r.avg_return.toFixed(2)}%</div>
          <div class="text-xs text-gray-500">平均報酬</div>
        </div>
        <div class="text-center">
          <div class="text-xl font-bold">${r.total}</div>
          <div class="text-xs text-gray-500">建議股數</div>
        </div>
      </div>
      <div class="text-xs text-gray-400 mb-1">🏆 前3強：${top3txt || '—'}</div>
      <button onclick="loadReviewDetail('${r.signal_date}','${r.review_date}');document.getElementById('review_history_card').classList.remove('hidden')"
        class="text-xs text-blue-400 hover:underline">查看完整檢討書 →</button>
    `;
  } catch(e) {
    document.getElementById('review_summary').textContent = '尚無檢討資料';
  }
}


async function showReviewHistory() {
  document.getElementById('review_history_card').classList.remove('hidden');
  const el = document.getElementById('review_history_list');
  el.innerHTML = '載入中...';
  try {
    const data = await fetch('/api/daily-review-history?limit=30').then(r=>r.json());
    if (!data.length) { el.innerHTML='<div class="text-gray-600 text-xs py-2">尚無歷史記錄</div>'; return; }
    el.innerHTML = `<table class="w-full text-xs">
      <thead><tr class="text-gray-500 border-b border-gray-700">
        <th class="text-left py-1">資料日</th>
        <th class="text-right">股數</th>
        <th class="text-right">勝率</th>
        <th class="text-right">平均報酬</th>
        <th class="text-center">詳情</th>
      </tr></thead><tbody>
      ${data.map(r=>`<tr class="border-b border-gray-800 hover:bg-surface-3">
        <td class="py-1">${r.signal_date}<br><span class="text-gray-600">→${r.review_date}</span></td>
        <td class="text-right">${r.total}</td>
        <td class="text-right font-mono" style="color:${r.win_rate>=60?'#44ff88':r.win_rate>=40?'#ffcc00':'#ff4444'}">${r.win_rate}%</td>
        <td class="text-right font-mono" style="color:${r.avg_return>=0?'#ff6b6b':'#51cf66'}">${r.avg_return>=0?'+':''}${r.avg_return.toFixed(2)}%</td>
        <td class="text-center">
          ${r.has_report?`<button onclick="loadReviewDetail('${r.signal_date}','${r.review_date}')" class="text-blue-400 hover:underline">查看</button>`:'—'}
        </td>
      </tr>`).join('')}
      </tbody></table>`;
  } catch(e) { el.innerHTML='載入失敗'; }
}

function hideReviewHistory() {
  document.getElementById('review_history_card').classList.add('hidden');
  closeReviewDetail();
}

async function loadReviewDetail(sigDate, revDate) {
  const el = document.getElementById('review_detail');
  const title = document.getElementById('review_detail_title');
  const content = document.getElementById('review_detail_content');
  el.classList.remove('hidden');
  title.textContent = `📋 ${sigDate} → ${revDate} 檢討書`;
  content.textContent = '載入中...';
  try {
    const d = await fetch(`/api/daily-review?signal_date=${sigDate}&review_date=${revDate}`).then(r=>r.json());
    // 簡單 markdown 轉 HTML
    var md = d.content || '無內容';
    var html = md
      .replace(/^# (.+)$/mg, '<h2 class="text-base font-bold text-white mb-2">$1</h2>')
      .replace(/^## (.+)$/mg, '<h3 class="text-sm font-semibold text-accent mt-4 mb-1 border-b border-gray-700 pb-1">$1</h3>')
      .replace(/^### (✅.+)$/mg, '<div class="mt-2 mb-1 text-green-400 font-semibold text-xs">$1</div>')
      .replace(/^### (🛑.+)$/mg, '<div class="mt-2 mb-1 text-red-400 font-semibold text-xs">$1</div>')
      .replace(/^### (.+)$/mg, '<div class="mt-2 mb-1 font-semibold text-xs text-yellow-400">$1</div>')
      .replace(/\*\*(.+?)\*\*/g, '<b class="text-white">$1</b>')
      .replace(/^> (.+)$/mg, '<div class="text-xs text-blue-400 border-l-2 border-blue-500 pl-2 my-1">$1</div>')
      .replace(/^---$/mg, '<hr class="border-gray-700 my-2">')
      .replace(/^\| (.+) \|$/mg, (m, row) => {
        if (row.includes('---')) return '';
        var cells = row.split(' | ');
        return '<div class="flex gap-2 text-xs border-b border-gray-800 py-0.5">' +
          cells.map(c => '<span class="flex-1">' + c + '</span>').join('') + '</div>';
      })
      .replace(/^- (.+)$/mg, '<div class="text-xs text-gray-300 pl-2 my-0.5">• $1</div>')
      .replace(/^\*(.+)\*$/mg, '<div class="text-xs text-gray-500 italic">$1</div>')
      .split('\n').map(l => l.startsWith('<') ? l : `<span class="text-xs text-gray-400">${l}</span><br>`).join('');
    content.innerHTML = html;
  } catch(e) { content.textContent = '載入失敗'; }
}

function closeReviewDetail() {
  const el = document.getElementById('review_detail');
  if (el) el.classList.add('hidden');
}


async function loadV5Summary() {
  try {
    const [accts, bench] = await Promise.all([
      fetch('/api/strategy-accounts').then(r=>r.json()),
      fetch('/api/benchmark/0050').then(r=>r.json()),
    ]);
    const benchRet = bench.length ? +bench[bench.length-1].cumulative_return : 0;
    const el = document.getElementById('dc_v5_accounts');
    if (!accts.length) { el.textContent = '尚無 V5 帳戶'; return; }
    el.innerHTML = `<table class="w-full text-xs">
      <thead><tr class="text-gray-500">
        <th class="text-left py-1">帳戶</th>
        <th class="text-right">總資產</th>
        <th class="text-right">累積報酬</th>
        <th class="text-right">Alpha</th>
      </tr></thead>
      <tbody>
      ${accts.map(a => {
        const ret = +(a.total_return||0);
        const alpha = +(ret - benchRet).toFixed(2);
        return `<tr class="border-t border-gray-800">
          <td class="py-1">A${a.account_id} ${a.name.replace('A'+a.account_id+' ','')}</td>
          <td class="text-right font-mono">${Math.round(a.total_equity||200000).toLocaleString()}</td>
          <td class="text-right font-mono ${ret>=0?'text-up':'text-dn'}">${ret>=0?'+':''}${ret.toFixed(2)}%</td>
          <td class="text-right font-mono ${alpha>=0?'text-up':'text-dn'}">${alpha>=0?'+':''}${alpha.toFixed(2)}%</td>
        </tr>`;
      }).join('')}
      <tr class="border-t border-yellow-800">
        <td class="py-1 text-yellow-400">📊 0050 benchmark</td>
        <td class="text-right">—</td>
        <td class="text-right font-mono text-yellow-400">${benchRet>=0?'+':''}${benchRet.toFixed(2)}%</td>
        <td class="text-right text-gray-600">基準</td>
      </tr>
      </tbody>
    </table>`;
  } catch(e) {
    const el = document.getElementById('dc_v5_accounts');
    if (el) el.textContent = 'V5 帳戶載入失敗';
  }
}


async function loadPaperStatus() {
  try {
    const [fills, accts] = await Promise.all([
      fetch('/api/paper/fills?limit=5').then(r=>r.json()),
      fetch('/api/strategy-accounts').then(r=>r.json()),
    ]);
    const totalAsset = accts.reduce((s,a)=>s+(a.total_equity||200000),0);
    const totalCash  = accts.reduce((s,a)=>s+(a.cash||200000),0);
    const totalMkt   = accts.reduce((s,a)=>s+(a.market_value||0),0);
    const manual = fills.filter(f=>f.fill_source==='manual').length;
    const simulated = fills.filter(f=>f.fill_source!=='manual').length;
    const el = document.getElementById('dc_paper_status');
    if (!el) return;
    el.innerHTML = `<div class="grid grid-cols-2 md:grid-cols-4 gap-2 text-xs mb-2">
      <div class="bg-surface-1 rounded p-2 text-center"><div class="text-gray-500">總資產</div><div class="font-bold font-mono">${Math.round(totalAsset).toLocaleString()}</div></div>
      <div class="bg-surface-1 rounded p-2 text-center"><div class="text-gray-500">現金</div><div class="font-mono">${Math.round(totalCash).toLocaleString()}</div></div>
      <div class="bg-surface-1 rounded p-2 text-center"><div class="text-gray-500">手動成交</div><div class="text-blue-400 font-bold">${manual}筆</div></div>
      <div class="bg-surface-1 rounded p-2 text-center"><div class="text-gray-500">估算成交</div><div class="text-gray-400">${simulated}筆</div></div>
    </div>
    ${fills.slice(0,3).map(f=>`<div class="text-xs border-t border-gray-800 py-1">
      <span class="${f.action==='BUY'?'text-up':'text-dn'} font-bold">${f.action}</span>
      <span class="text-blue-400 ml-1">${f.code}</span>
      <span class="ml-1">@${f.fill_price}</span>
      <span class="ml-1 px-1 rounded text-xs ${f.fill_source==='manual'?'bg-blue-900/40 text-blue-400':'bg-gray-800 text-gray-500'}">${f.fill_source==='manual'?'手動':'估算'}</span>
    </div>`).join('')}`;
  } catch(e) {}
}

async function loadRestrictions() {
  var items = [];

  try {
    var ks = await fetch('/api/v4/strategies/kill-switch').then(r=>r.json());
    ks.filter(k=>k.status==='PAUSED').forEach(k=>
      items.push(`🛑 S${k.strategy_id} ${k.strategy_name} 已暫停，不得新買`)
    );
  } catch(e){}

  try {
    var dq = await fetch('/api/quality/data').then(r=>r.json());
    (dq.checks||[]).filter(c=>c.status==='FAIL').forEach(c=>
      items.push(`❌ 資料異常：${c.check_type} - ${c.message}`)
    );
  } catch(e){}

  // 固定規則
  items.push('🚫 0050 不得被短線策略強制賣出');
  items.push('🚫 同日買進股票，不得同日賣出同批股票（禁止當沖）');
  items.push('⚠️ 分鐘資料未啟用，盤中提醒不可用（不影響日級 T+1 策略）');
  items.push('📋 所有 BUY 建議需使用者確認後才可執行，系統不自動下單');

  try {
    var signals = await fetch('/api/candidates/trade-plans?limit=30').then(r=>r.json());
    var blocked = (Array.isArray(signals)?signals:[]).filter(s=>s.invalid_buy_condition);
    if (blocked.length)
      items.push(`⚠️ 今日 ${blocked.length} 檔候選股不可追高（RSI過熱/離均線過遠）`);
  } catch(e){}

  document.getElementById('dc_restrictions').innerHTML =
    items.map(i=>`<div class="dc-row"><span class="text-gray-300 text-xs">${i}</span></div>`).join('') ||
    '<div class="text-gray-600 text-xs">今日無特別限制</div>';
}


// ── 作戰室初始化 ──
async function initWarRoom() {
  try {
    // 最新交易日
    const cal = await fetch('/api/v6/trading-calendar/latest').then(r=>r.json()).catch(()=>null);
    const latestDate = cal?.latest_trading_date || new Date().toISOString().slice(0,10);
    document.getElementById('dc_warroom_date').textContent =
      `最新交易日：${latestDate} | ${new Date().toLocaleString('zh-TW')}`;

    // Benchmark 狀態
    const bench = await fetch('/api/v6/benchmark/status').then(r=>r.json()).catch(()=>null);
    if (bench?.has_anomaly) {
      document.getElementById('dc_benchmark_warning').classList.remove('hidden');
    }

    // 大盤狀況 → 判斷今日是否可交易
    const mkt = await fetch('/api/market/regime').then(r=>r.json()).catch(()=>null);
    const risk = mkt?.risk_level || 'medium';
    const allowed_el = document.getElementById('dc_trading_allowed');
    if (risk === 'high') {
      allowed_el.textContent = '🛑 高風險，建議觀察';
      allowed_el.className = 'text-xs px-3 py-1 rounded-full border border-red-700 text-red-400 bg-red-900/20';
    } else if (risk === 'low') {
      allowed_el.textContent = '✅ 可積極買進';
      allowed_el.className = 'text-xs px-3 py-1 rounded-full border border-green-700 text-green-400 bg-green-900/20';
    } else {
      allowed_el.textContent = '⚡ 正常操作';
      allowed_el.className = 'text-xs px-3 py-1 rounded-full border border-yellow-700 text-yellow-400 bg-yellow-900/20';
    }

    // 交易限制
    const ks = await fetch('/api/v4/strategies/kill-switch').then(r=>r.json()).catch(()=>({}));
    const ksActive = (ks?.strategies||[]).filter(s=>s.status==='KILL_SWITCH');
    const pm = parseFloat(mkt?.position_multiplier||1);
    document.getElementById('dc_restrictions_content').innerHTML = `
      <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
        <div>買進 <span class="${risk==='high'?'text-red-400':'text-green-400'} font-bold">${risk==='high'?'暫停':'允許'}</span></div>
        <div>部位乘數 <span class="text-accent font-bold">${(pm*100).toFixed(0)}%</span></div>
        <div>禁止當沖 <span class="text-yellow-400 font-bold">✓ 系統強制</span></div>
        <div>Kill Switch <span class="${ksActive.length?'text-red-400':'text-gray-500'} font-bold">${ksActive.length ? ksActive.length+'個' : '無'}</span></div>
      </div>
      <div class="mt-1 text-gray-600">⚠️ 禁止買進後同日賣出（系統自動攔截）</div>
    `;
  } catch(e) { console.warn('warroom init', e); }
}

document.addEventListener('DOMContentLoaded', () => {
  initWarRoom();
  loadFreshness();
  loadMarket();
  loadReview();
  loadSignals();
  loadAccounts();
  loadRestrictions();
  loadPaperStatus();
  loadV5Summary();
});
</script>
